      const root = document.getElementById(&#x27;csharp-quiz-app&#x27;);

        title: &#x27;Variables, types et conditions&#x27;,
        version: &#x27;1.0&#x27;,
        durationMinutes: 25,
        questions: [
          {
            id: &#x27;q1-type-entier&#x27;,
            type: &#x27;single_choice&#x27;,
            title: &#x27;Choisir un type&#x27;,
            prompt: &#x27;Quel type C# est le plus adapté pour stocker le nombre d’élèves présents dans une classe ?&#x27;,
            points: 2,
            required: true,
            options: [&#x27;double&#x27;, &#x27;string&#x27;, &#x27;int&#x27;, &#x27;bool&#x27;]

          {
            id: &#x27;q2-variable&#x27;,

            title: &#x27;Expliquer une notion&#x27;,
            prompt: &#x27;Explique avec tes propres mots ce qu’est une variable en programmation.&#x27;,
            hint: &#x27;Une ou deux phrases suffisent. Un exemple peut compléter ton explication.&#x27;,
            points: 3,
            required: true
          },
          {
            id: &#x27;q3-declaration&#x27;,
            type: &#x27;fill_blank&#x27;,
            title: &#x27;Compléter une instruction&#x27;,
            prompt: &#x27;Complète le mot manquant pour déclarer une variable entière appelée age.&#x27;,
            codeBefore: &#x27;___ age = 15;&#x27;,
            points: 2,
            required: true
          },
          {
            id: &#x27;q4-affectation&#x27;,
            type: &#x27;true_false_justify&#x27;,
            title: &#x27;Vrai ou faux, avec justification&#x27;,
            prompt: &#x27;L’instruction suivante crée une variable appelée total et lui donne la valeur 12.&#x27;,
            codeBefore: &#x27;int total = 12;&#x27;,
            points: 3,
            required: true
          },

            id: &#x27;q5-sortie&#x27;,
            type: &#x27;short_text&#x27;,
            title: &#x27;Prédire un affichage&#x27;,
            prompt: &#x27;Qu’affiche ce programme ? Écris exactement le résultat attendu.&#x27;,
            codeBefore: &#x27;int a = 4;\nint b = 3;\nConsole.WriteLine(a + b * 2);&#x27;,
            points: 2,
            required: true
          },
          {
            id: &#x27;q6-erreur&#x27;,
            type: &#x27;long_text&#x27;,
            title: &#x27;Repérer et corriger une erreur&#x27;,
            prompt: &#x27;Ce code provoque une erreur. Explique le problème et propose une correction.&#x27;,
            codeBefore: &#x27;int age = &quot;16&quot;;\nConsole.WriteLine(age);&#x27;,
            points: 3,
            required: true
          },
          {
            id: &#x27;q7-condition&#x27;,
            type: &#x27;single_choice&#x27;,
            title: &#x27;Comprendre une condition&#x27;,
            prompt: &#x27;Quelle condition est vraie lorsque score vaut 10 ou plus ?&#x27;,

            required: true,
            options: [&#x27;score &gt; 10&#x27;, &#x27;score &gt;= 10&#x27;, &#x27;score = 10&#x27;, &#x27;score &lt;= 10&#x27;]
          },
          {
            id: &#x27;q8-programme&#x27;,
            type: &#x27;code&#x27;,
            title: &#x27;Écrire un petit programme&#x27;,
            prompt: &#x27;Écris un extrait C# qui déclare une variable temperature, puis affiche « Froid » si sa valeur est inférieure à 10 et « Doux » dans le cas contraire.&#x27;,
            hint: &#x27;Plusieurs solutions correctes sont possibles. La syntaxe et la logique seront évaluées séparément.&#x27;,
            points: 3,
            required: true
          }
        ]
      };

      const state = {
        current: 0,
        studentName: &#x27;&#x27;,
        studentClass: &#x27;&#x27;,
        timerEnabled: true,
        startedAt: null,
        submittedAt: null,
        deadline: null,
        answers: {},
        flagged: {},
        timerHandle: null,
        finalPayload: null
      };

      const $ = (selector) =&gt; root.querySelector(selector);
      const screens = [&#x27;start&#x27;, &#x27;quiz&#x27;, &#x27;review&#x27;, &#x27;result&#x27;];

      function showScreen(name) {
        screens.forEach((screen) =&gt; {
          $(&#x27;#screen-&#x27; + screen).classList.toggle(&#x27;hidden&#x27;, screen !== name);
        });
        window.scrollTo({ top: 0, behavior: &#x27;smooth&#x27; });
      }

      function announce(message) {
        $(&#x27;#live-status&#x27;).textContent = message;
      }

      function totalPoints() {
        return EXAM.questions.reduce((sum, q) =&gt; sum + q.points, 0);
      }

      function isAnswered(question) {
        const value = state.answers[question.id];
        if (question.type === &#x27;true_false_justify&#x27;) {
          return Boolean(value &amp;&amp; value.choice &amp;&amp; value.justification &amp;&amp; value.justification.trim());
        }
        return typeof value === &#x27;string&#x27; ? Boolean(value.trim()) : Boolean(value);
      }

      function answeredCount() {
        return EXAM.questions.filter(isAnswered).length;
      }

      function missingQuestions() {
        return EXAM.questions.filter((q) =&gt; q.required &amp;&amp; !isAnswered(q));
      }

      function escapeHtml(value) {
        return String(value)
          .replaceAll(&#x27;&amp;&#x27;, &#x27;&amp;amp;&#x27;)
          .replaceAll(&#x27;&lt;&#x27;, &#x27;&amp;lt;&#x27;)
          .replaceAll(&#x27;&gt;&#x27;, &#x27;&amp;gt;&#x27;)
          .replaceAll(&#x27;&quot;&#x27;, &#x27;&amp;quot;&#x27;)
          .replaceAll(&quot;&#x27;&quot;, &#x27;&amp;#039;&#x27;);
      }

      function answerSummary(question) {
        const answer = state.answers[question.id];
        if (!isAnswered(question)) return &#x27;Aucune réponse&#x27;;
        if (question.type === &#x27;true_false_justify&#x27;) {
          return (answer.choice === &#x27;true&#x27; ? &#x27;Vrai&#x27; : &#x27;Faux&#x27;) + &#x27; — &#x27; + answer.justification;
        }
        return String(answer);
      }

      function renderNavigation() {
        const nav = $(&#x27;#question-nav&#x27;);
        nav.innerHTML = &#x27;&#x27;;
        EXAM.questions.forEach((question, index) =&gt; {
          const button = document.createElement(&#x27;button&#x27;);
          button.type = &#x27;button&#x27;;
          button.className = &#x27;btn&#x27;;
          if (index === state.current) {
            button.classList.add(&#x27;is-selected&#x27;);
            button.setAttribute(&#x27;aria-current&#x27;, &#x27;step&#x27;);
          }
          if (isAnswered(question)) button.classList.add(&#x27;is-answered&#x27;);
          if (state.flagged[question.id]) button.classList.add(&#x27;is-flagged&#x27;);
          button.textContent = String(index + 1);
          button.setAttribute(&#x27;aria-label&#x27;, &#x27;Question &#x27; + (index + 1) + (isAnswered(question) ? &#x27;, répondue&#x27; : &#x27;, sans réponse&#x27;));
          button.addEventListener(&#x27;click&#x27;, () =&gt; goToQuestion(index));
          nav.appendChild(button);
        });
      }

      function renderQuestion() {
        const question = EXAM.questions[state.current];
        $(&#x27;#question-number&#x27;).textContent = &#x27;Question &#x27; + (state.current + 1) + &#x27; sur &#x27; + EXAM.questions.length;
        $(&#x27;#question-title&#x27;).textContent = question.title;
        $(&#x27;#question-points&#x27;).textContent = question.points + (question.points &gt; 1 ? &#x27; points&#x27; : &#x27; point&#x27;);
        let body = &#x27;&lt;p&gt;&#x27; + escapeHtml(question.prompt) + &#x27;&lt;/p&gt;&#x27;;
        if (question.codeBefore) body += &#x27;&lt;pre&gt;&lt;code&gt;&#x27; + escapeHtml(question.codeBefore) + &#x27;&lt;/code&gt;&lt;/pre&gt;&#x27;;
        if (question.hint) body += &#x27;&lt;p class=&quot;text-muted text-small&quot;&gt;&#x27; + escapeHtml(question.hint) + &#x27;&lt;/p&gt;&#x27;;
        $(&#x27;#question-body&#x27;).innerHTML = body;

        const answerArea = $(&#x27;#answer-area&#x27;);
        answerArea.innerHTML = &#x27;&#x27;;
        const saved = state.answers[question.id];

        if (question.type === &#x27;single_choice&#x27;) {
          const list = document.createElement(&#x27;div&#x27;);
          list.className = &#x27;choice-list&#x27;;
          question.options.forEach((option, index) =&gt; {
            const id = &#x27;choice-&#x27; + question.id + &#x27;-&#x27; + index;
            const label = document.createElement(&#x27;label&#x27;);
            label.className = &#x27;choice-row&#x27;;
            label.htmlFor = id;
            const input = document.createElement(&#x27;input&#x27;);
            input.type = &#x27;radio&#x27;;
            input.name = question.id;
            input.id = id;
            input.value = option;
            input.checked = saved === option;
            input.addEventListener(&#x27;change&#x27;, () =&gt; saveAnswer(question, input.value));
            const span = document.createElement(&#x27;span&#x27;);
            span.textContent = option;
            label.append(input, span);
            list.appendChild(label);
          });
          answerArea.appendChild(list);
        } else if (question.type === &#x27;true_false_justify&#x27;) {
          const choices = document.createElement(&#x27;div&#x27;);
          choices.className = &#x27;choice-list&#x27;;
          [[&#x27;true&#x27;, &#x27;Vrai&#x27;], [&#x27;false&#x27;, &#x27;Faux&#x27;]].forEach(([value, labelText]) =&gt; {
            const id = question.id + &#x27;-&#x27; + value;
            const label = document.createElement(&#x27;label&#x27;);
            label.className = &#x27;choice-row&#x27;;
            label.htmlFor = id;
            const input = document.createElement(&#x27;input&#x27;);
            input.type = &#x27;radio&#x27;;
            input.name = question.id;
            input.id = id;
            input.value = value;
            input.checked = Boolean(saved &amp;&amp; saved.choice === value);
            input.addEventListener(&#x27;change&#x27;, () =&gt; {
              const current = state.answers[question.id] || {};
              saveAnswer(question, { choice: value, justification: current.justification || &#x27;&#x27; });
            });
            const span = document.createElement(&#x27;span&#x27;);
            span.textContent = labelText;
            label.append(input, span);
            choices.appendChild(label);
          });
          const justifyLabel = document.createElement(&#x27;label&#x27;);
          justifyLabel.className = &#x27;form-label&#x27;;
          justifyLabel.htmlFor = question.id + &#x27;-justification&#x27;;
          justifyLabel.textContent = &#x27;Justification&#x27;;
          const textarea = document.createElement(&#x27;textarea&#x27;);
          textarea.className = &#x27;form-control&#x27;;
          textarea.id = question.id + &#x27;-justification&#x27;;
          textarea.rows = 4;
          textarea.placeholder = &#x27;Explique pourquoi…&#x27;;
          textarea.value = saved ? saved.justification || &#x27;&#x27; : &#x27;&#x27;;
          textarea.addEventListener(&#x27;input&#x27;, () =&gt; {
            const current = state.answers[question.id] || {};
            saveAnswer(question, { choice: current.choice || &#x27;&#x27;, justification: textarea.value });
          });
          answerArea.append(choices, justifyLabel, textarea);
        } else {
          const label = document.createElement(&#x27;label&#x27;);
          label.className = &#x27;form-label&#x27;;
          label.htmlFor = &#x27;answer-&#x27; + question.id;
          label.textContent = question.type === &#x27;code&#x27; ? &#x27;Ton code C#&#x27; : &#x27;Ta réponse&#x27;;
          const longAnswer = [&#x27;definition&#x27;, &#x27;long_text&#x27;, &#x27;code&#x27;].includes(question.type);
          const input = longAnswer ? document.createElement(&#x27;textarea&#x27;) : document.createElement(&#x27;input&#x27;);
          input.className = &#x27;form-control&#x27; + (longAnswer ? &#x27;&#x27; : &#x27; short-answer&#x27;);
          input.id = &#x27;answer-&#x27; + question.id;
          input.value = saved || &#x27;&#x27;;
          input.placeholder = question.type === &#x27;code&#x27; ? &#x27;Écris ton code ici…&#x27; : &#x27;Saisis ta réponse…&#x27;;
          if (longAnswer) input.rows = question.type === &#x27;code&#x27; ? 9 : 6;
          input.addEventListener(&#x27;input&#x27;, () =&gt; saveAnswer(question, input.value));
          answerArea.append(label, input);
        }

        $(&#x27;#flag-question&#x27;).checked = Boolean(state.flagged[question.id]);
        $(&#x27;#prev-button&#x27;).disabled = state.current === 0;
        $(&#x27;#next-button&#x27;).textContent = state.current === EXAM.questions.length - 1 ? &#x27;Voir le récapitulatif&#x27; : &#x27;Suivante&#x27;;
        updateProgress();
        renderNavigation();
      }

      function saveAnswer(question, value) {
        state.answers[question.id] = value;
        updateProgress();
        renderNavigation();
      }

      function updateProgress() {
        const count = answeredCount();
        $(&#x27;#progress-label&#x27;).textContent = count + &#x27; sur &#x27; + EXAM.questions.length + &#x27; répondue&#x27; + (count &gt; 1 ? &#x27;s&#x27; : &#x27;&#x27;);
        $(&#x27;#progress-fill&#x27;).style.width = ((count / EXAM.questions.length) * 100) + &#x27;%&#x27;;
      }

      function goToQuestion(index) {
        state.current = Math.max(0, Math.min(EXAM.questions.length - 1, index));
        showScreen(&#x27;quiz&#x27;);
        renderQuestion();
        $(&#x27;#question-title&#x27;).focus?.();
        announce(&#x27;Question &#x27; + (state.current + 1));
      }

      function renderReview() {
        const count = answeredCount();
        $(&#x27;#review-count&#x27;).textContent = count + &#x27;/&#x27; + EXAM.questions.length + &#x27; répondues&#x27;;
        const list = $(&#x27;#review-list&#x27;);
        list.innerHTML = &#x27;&#x27;;
        EXAM.questions.forEach((question, index) =&gt; {
          const item = document.createElement(&#x27;div&#x27;);
          item.className = &#x27;review-item&#x27;;
          const title = document.createElement(&#x27;strong&#x27;);
          title.textContent = (index + 1) + &#x27;. &#x27; + question.title + &#x27; — &#x27; + question.points + &#x27; pt&#x27; + (question.points &gt; 1 ? &#x27;s&#x27; : &#x27;&#x27;);
          const preview = document.createElement(&#x27;p&#x27;);
          preview.className = &#x27;answer-preview text-small&#x27;;
          preview.textContent = answerSummary(question);
          const button = document.createElement(&#x27;button&#x27;);
          button.className = &#x27;btn btn-ghost&#x27;;
          button.type = &#x27;button&#x27;;
          button.textContent = &#x27;Modifier&#x27;;
          button.addEventListener(&#x27;click&#x27;, () =&gt; goToQuestion(index));
          item.append(title, preview, button);
          list.appendChild(item);
        });
        const missing = missingQuestions();
        const box = $(&#x27;#validation-message&#x27;);
        if (missing.length) {
          box.classList.remove(&#x27;hidden&#x27;);
          box.textContent = &#x27;Il reste &#x27; + missing.length + &#x27; question&#x27; + (missing.length &gt; 1 ? &#x27;s obligatoires&#x27; : &#x27; obligatoire&#x27;) + &#x27; sans réponse. Tu peux relire le récapitulatif puis revenir les compléter.&#x27;;
        } else {
          box.classList.add(&#x27;hidden&#x27;);
          box.textContent = &#x27;&#x27;;
        }
        showScreen(&#x27;review&#x27;);
      }

      function formatDuration(seconds) {
        const minutes = Math.floor(seconds / 60);
        const remainder = seconds % 60;
        return minutes + &#x27; min &#x27; + String(remainder).padStart(2, &#x27;0&#x27;) + &#x27; s&#x27;;
      }

      function updateTimer() {
        if (!state.timerEnabled || !state.deadline || state.submittedAt) return;
        const remaining = Math.max(0, Math.ceil((state.deadline - Date.now()) / 1000));
        const minutes = Math.floor(remaining / 60);
        const seconds = remaining % 60;
        $(&#x27;#timer-value&#x27;).textContent = String(minutes).padStart(2, &#x27;0&#x27;) + &#x27;:&#x27; + String(seconds).padStart(2, &#x27;0&#x27;);
        $(&#x27;#timer-value&#x27;).classList.toggle(&#x27;is-low&#x27;, remaining &lt;= 300);
        if (remaining === 0) {
          clearInterval(state.timerHandle);
          renderReview();
          $(&#x27;#validation-message&#x27;).classList.remove(&#x27;hidden&#x27;);
          $(&#x27;#validation-message&#x27;).textContent = &#x27;Le temps conseillé est écoulé. Complète les réponses manquantes si ton professeur l’autorise, puis valide.&#x27;;
          announce(&#x27;Le temps conseillé est écoulé.&#x27;);
        }
      }

      function normalizeAnswer(question, answer) {
        if (question.type === &#x27;true_false_justify&#x27;) {
          return {
            choix: answer?.choice === &#x27;true&#x27; ? &#x27;vrai&#x27; : answer?.choice === &#x27;false&#x27; ? &#x27;faux&#x27; : &#x27;&#x27;,
            justification: answer?.justification?.trim() || &#x27;&#x27;
          };
        }
        return typeof answer === &#x27;string&#x27; ? answer.trim() : &#x27;&#x27;;
      }

      function createPayload() {
        const durationSeconds = Math.max(0, Math.round((state.submittedAt - state.startedAt) / 1000));
        return {
          format: &#x27;interro-csharp-reponses&#x27;,
          schemaVersion: 1,
          interrogation: {
            id: EXAM.id,
            titre: EXAM.title,
            version: EXAM.version,
            totalPoints: totalPoints(),
            nombreQuestions: EXAM.questions.length
          },
          eleve: {
            nomComplet: state.studentName,
            classe: state.studentClass
          },
          session: {
            debut: new Date(state.startedAt).toISOString(),
            fin: new Date(state.submittedAt).toISOString(),
            dureeSecondes: durationSeconds,
            chronometreActive: state.timerEnabled
          },
          correction: {
            statut: &#x27;a_corriger&#x27;,
            noteAttribuee: null,
            commentaireGeneral: &#x27;&#x27;
          },
          reponses: EXAM.questions.map((question, index) =&gt; ({
            numero: index + 1,
            questionId: question.id,
            type: question.type,
            intitule: question.prompt,
            pointsMaximum: question.points,
            reponseEleve: normalizeAnswer(question, state.answers[question.id]),
            marqueeARevoir: Boolean(state.flagged[question.id]),
            evaluation: {
              pointsAttribues: null,
              statut: &#x27;non_evalue&#x27;,
              commentaire: &#x27;&#x27;
            }
          }))
        };
      }

      function finalizeExam() {
        const missing = missingQuestions();
        if (missing.length) {
          renderReview();
          $(&#x27;#validation-message&#x27;).classList.remove(&#x27;hidden&#x27;);
          $(&#x27;#validation-message&#x27;).textContent = &#x27;Validation impossible : réponds aux &#x27; + missing.length + &#x27; question&#x27; + (missing.length &gt; 1 ? &#x27;s obligatoires&#x27; : &#x27; obligatoire&#x27;) + &#x27; restante&#x27; + (missing.length &gt; 1 ? &#x27;s&#x27; : &#x27;&#x27;) + &#x27;.&#x27;;
          return;
        }
        state.submittedAt = Date.now();
        clearInterval(state.timerHandle);
        state.finalPayload = createPayload();
        const seconds = Math.round((state.submittedAt - state.startedAt) / 1000);
        $(&#x27;#result-student&#x27;).textContent = state.studentName;
        $(&#x27;#result-answered&#x27;).textContent = answeredCount() + &#x27;/&#x27; + EXAM.questions.length;
        $(&#x27;#result-duration&#x27;).textContent = formatDuration(seconds);
        $(&#x27;#result-message&#x27;).textContent = &#x27;Merci &#x27; + state.studentName + &#x27;. Tes réponses sont prêtes à être envoyées.&#x27;;
        $(&#x27;#header-status&#x27;).textContent = &#x27;Terminée&#x27;;
        showScreen(&#x27;result&#x27;);
        announce(&#x27;Interrogation validée. Les réponses sont prêtes à être envoyées.&#x27;);
      }

      async function sendAnswers() {
        const button = $(&#x27;#send-answers&#x27;);
        const status = $(&#x27;#export-status&#x27;);
        if (!state.finalPayload || button.dataset.sent === &#x27;true&#x27;) return;

        button.disabled = true;
        button.textContent = &#x27;Envoi en cours…&#x27;;
        status.textContent = &#x27;Envoi sécurisé de la copie…&#x27;;

        try {
          const response = await fetch(&#x27;https://questionnaires-section-info.sjbonjean.workers.dev/submit&#x27;, {
            method: &#x27;POST&#x27;,
            headers: { &#x27;Content-Type&#x27;: &#x27;application/json&#x27; },
            body: JSON.stringify(state.finalPayload)
          });
          const result = await response.json().catch(() =&gt; ({}));
          if (!response.ok || result.ok !== true) {
            throw new Error(result.error || &#x27;Envoi refusé&#x27;);
          }

          button.dataset.sent = &#x27;true&#x27;;
          button.textContent = &#x27;Réponses envoyées&#x27;;
          status.textContent = &#x27;Ta copie a bien été remise. Tu peux fermer cette page.&#x27;;
          $(&#x27;#result-message&#x27;).textContent = &#x27;Merci &#x27; + state.studentName + &#x27;. Ta copie a bien été remise.&#x27;;
          announce(&#x27;Réponses envoyées avec succès.&#x27;);
        } catch (error) {
          button.disabled = false;
          button.textContent = &#x27;Réessayer l\&#x27;envoi&#x27;;
          status.textContent = &#x27;L\&#x27;envoi n\&#x27;a pas abouti. Vérifie la connexion Internet puis réessaie.&#x27;;
          announce(&#x27;L\&#x27;envoi a échoué. Tu peux réessayer.&#x27;);
        }
      }

      $(&#x27;#start-button&#x27;).addEventListener(&#x27;click&#x27;, () =&gt; {
        const name = $(&#x27;#student-name&#x27;).value.trim();
        if (!name) {
          $(&#x27;#start-error&#x27;).classList.remove(&#x27;hidden&#x27;);
          $(&#x27;#student-name&#x27;).focus();
          return;
        }
        $(&#x27;#start-error&#x27;).classList.add(&#x27;hidden&#x27;);
        state.studentName = name;
        state.studentClass = $(&#x27;#student-class&#x27;).value.trim();
        state.timerEnabled = true;
        state.startedAt = Date.now();
        state.deadline = state.startedAt + EXAM.durationMinutes * 60 * 1000;
        $(&#x27;#timer-wrap&#x27;).classList.remove(&#x27;hidden&#x27;);
        $(&#x27;#header-status&#x27;).textContent = &#x27;En cours&#x27;;
        updateTimer();
        state.timerHandle = setInterval(updateTimer, 1000);
        renderQuestion();
        showScreen(&#x27;quiz&#x27;);
        announce(&#x27;Interrogation commencée. Question 1.&#x27;);
      });

      $(&#x27;#prev-button&#x27;).addEventListener(&#x27;click&#x27;, () =&gt; goToQuestion(state.current - 1));
      $(&#x27;#next-button&#x27;).addEventListener(&#x27;click&#x27;, () =&gt; {
        if (state.current === EXAM.questions.length - 1) renderReview();
        else goToQuestion(state.current + 1);
      });
      $(&#x27;#finish-button&#x27;).addEventListener(&#x27;click&#x27;, renderReview);
      $(&#x27;#review-button&#x27;).addEventListener(&#x27;click&#x27;, renderReview);
      $(&#x27;#back-to-quiz&#x27;).addEventListener(&#x27;click&#x27;, () =&gt; goToQuestion(state.current));
      $(&#x27;#submit-exam&#x27;).addEventListener(&#x27;click&#x27;, finalizeExam);
      $(&#x27;#flag-question&#x27;).addEventListener(&#x27;change&#x27;, (event) =&gt; {
        const question = EXAM.questions[state.current];
        state.flagged[question.id] = event.target.checked;
        renderNavigation();
      });
      $(&#x27;#send-answers&#x27;).addEventListener(&#x27;click&#x27;, sendAnswers);

      $(&#x27;#header-status&#x27;).textContent = &#x27;Non commencée&#x27;;
    })();
  &lt;/script&gt;
&lt;/div&gt;

&lt;script src=&quot;https://unpkg.com/@floating-ui/core@1.7.3/dist/floating-ui.core.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script src=&quot;https://unpkg.com/@floating-ui/dom@1.7.4/dist/floating-ui.dom.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script&gt;
(() =&gt; {
  if (window.FloatingUIDOM == null) {

  }
  const { autoUpdate, computePosition, flip, offset, shift, size } =
    window.FloatingUIDOM;
  const tooltipPlacements = new Set([&quot;top&quot;, &quot;right&quot;, &quot;bottom&quot;, &quot;left&quot;]);
  const tooltipId = `codex-visualization-tooltip-${
    window.crypto?.randomUUID?.() ?? Date.now().toString(36)
  }`;
  const tooltipGap = 5;
  const hoverDelay = 700;
  const skipDelay = 300;
  let activeTrigger = null;
  let pendingTrigger = null;

  const getTrigger = (target) =&gt;

    target?.nodeType != null &amp;&amp; trigger.contains(target);
  const getContent = (trigger) =&gt;
    trigger.getAttribute(&quot;data-tooltip&quot;)?.trim() ?? &quot;&quot;;
  const getPlacement = (trigger) =&gt; {
    const placement = trigger.getAttribute(&quot;data-tooltip-placement&quot;);
    return tooltipPlacements.has(placement) ? placement : &quot;top&quot;;
  };
  const getTooltip = () =&gt; {
    if (tooltip == null) {
      tooltip = document.createElement(&quot;div&quot;);
      tooltip.id = tooltipId;
      tooltip.className = &quot;tooltip&quot;;
      tooltip.setAttribute(&quot;role&quot;, &quot;tooltip&quot;);

  };
