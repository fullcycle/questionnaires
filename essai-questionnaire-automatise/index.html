<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <meta http-equiv="refresh" content="0; url=https://fullcycle.github.io/questionnaires/">
  <title>Ouverture du questionnaire…</title>
  <style>
    body {
      display: grid;
      min-height: 100vh;
      margin: 0;
      place-items: center;
      background: #f3f7fc;
      color: #162238;
      font: 16px/1.5 system-ui, sans-serif;
    }

    main {
      width: min(520px, calc(100% - 32px));
      padding: 28px;
      border: 1px solid #dce3ee;
      border-radius: 18px;
      background: #fff;
      box-shadow: 0 18px 50px rgba(36, 50, 74, .13);
      text-align: center;
    }

    a {
      display: inline-flex;
      min-height: 46px;
      align-items: center;
      justify-content: center;
      margin-top: 10px;
      padding: 0 18px;
      border-radius: 11px;
      background: #0b57d0;
      color: #fff;
      font-weight: 750;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main>
    <h1>Ouverture du questionnaire…</h1>
    <p>Vous allez être redirigé vers l’interrogation.</p>
    <a href="https://fullcycle.github.io/questionnaires/">Commencer l’interrogation</a>
  </main>
  <script>
    window.location.replace("https://fullcycle.github.io/questionnaires/");
  </script>
</body>
</html>
